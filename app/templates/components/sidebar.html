<aside class="sidebar">

    <div class="sidebar-brand">
        <div class="brand-name">◆ El Illimani</div>
        <div class="brand-sub">Sistema de Control</div>
    </div>

    {% if current_user.is_authenticated %}
    <div class="sidebar-user">

        <div class="user-avatar">
            {{ current_user.nombre_usuario[:2].upper() }}
        </div>

        <div>
            <div class="user-name">
                {{ current_user.nombre_usuario }}
            </div>

            <div class="user-role">
                {{ current_user.rol }}
            </div>
        </div>

    </div>
    {% endif %}

    <nav class="sidebar-nav">

        <a class="nav-item"
           href="{{ url_for('dashboard.index') }}">
            Dashboard
        </a>

        <a class="nav-item" href="#">
            Ventas
        </a>

        <a class="nav-item" href="#">
            Compras
        </a>

        <a class="nav-item" href="#">
            Inventario
        </a>

        <a class="nav-item" href="#">
            Clientes
        </a>

        <a class="nav-item" href="#">
            Proveedores
        </a>

        <a class="nav-item" href="#">
            Reportes
        </a>

    </nav>

    <div class="sidebar-footer">

        <a href="{{ url_for('auth.logout') }}">
            Cerrar sesión
        </a>

    </div>

</aside>
