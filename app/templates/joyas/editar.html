{% extends "base.html" %}

{% block titulo %}
Editar Joya
{% endblock %}

{% block page_title %}
Editar Joya
{% endblock %}

{% block page_sub %}
Modificar información de la joya
{% endblock %}

{% block content %}

<div class="card">

    <form method="POST">

        <div class="form-group">
            <label>Código</label>
            <input type="text"
                   name="codigo"
                   value="{{ joya.codigo }}"
                   required>
        </div>

        <div class="form-group">
            <label>Nombre</label>
            <input type="text"
                   name="nombre"
                   value="{{ joya.nombre }}"
                   required>
        </div>

        <div class="form-group">
            <label>Categoría</label>

            <select name="id_categoria" required>

                {% for categoria in categorias %}

                <option value="{{ categoria.id_categoria }}"
                    {% if categoria.id_categoria == joya.id_categoria %}
                        selected
                    {% endif %}>
                    {{ categoria.nombre_categoria }}
                </option>

                {% endfor %}

            </select>

        </div>

        <div class="form-group">
            <label>Material</label>

            <select name="id_material" required>

                {% for material in materiales %}

                <option value="{{ material.id_material }}"
                    {% if material.id_material == joya.id_material %}
                        selected
                    {% endif %}>
                    {{ material.nombre_material }}
                </option>

                {% endfor %}

            </select>

        </div>

        <div class="form-group">
            <label>Precio Compra</label>

            <input type="number"
                   step="0.01"
                   name="precio_compra"
                   value="{{ joya.precio_compra }}"
                   required>
        </div>

        <div class="form-group">
            <label>Precio Venta</label>

            <input type="number"
                   step="0.01"
                   name="precio_venta"
                   value="{{ joya.precio_venta }}"
                   required>
        </div>

        <div class="form-group">
            <label>Stock Mínimo</label>

            <input type="number"
                   name="stock_minimo"
                   value="{{ joya.stock_minimo }}"
                   required>
        </div>

        <div class="form-group">

            <label>

                <input type="checkbox"
                       name="activo"
                       {% if joya.activo %}checked{% endif %}>

                Activo

            </label>

        </div>

        <button type="submit">
            Actualizar
        </button>

        <a href="{{ url_for('joya.index') }}">
            Cancelar
        </a>

    </form>

</div>

{% endblock %}
