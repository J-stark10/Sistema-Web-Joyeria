{% extends 'base.html' %}

{% block title %}
Crear Usuario
{% endblock %}

{% block content %}

<h2>Crear Usuario</h2>

<form method="POST">

    <input
        type="text"
        name="nombre_usuario"
        placeholder="Usuario"
        required
    >

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Contraseña"
        required
    >

    <br><br>

    <select name="rol">

        <option value="ADMIN">
            Administrador
        </option>

        <option value="VENDEDOR">
            Vendedor
        </option>

    </select>

    <br><br>

    <button type="submit">
        Guardar
    </button>

</form>

{% endblock %}
