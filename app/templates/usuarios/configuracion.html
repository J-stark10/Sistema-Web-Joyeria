{% extends "base.html" %}

{% block content %}
<div class="p-6">

  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-text">Configuración</h1>
    <p class="text-sm text-gray-500">Preferencias del sistema</p>
  </div>

  <!-- Card Config -->
  <div class="bg-card rounded-lg shadow p-6">

    <!-- Preferencias -->
    <div class="mb-6">
      <h2 class="text-lg font-semibold text-text mb-4">Preferencias</h2>

      <div class="flex items-center justify-between mb-3">
        <span class="text-sm text-gray-600">Modo oscuro</span>
        <input type="checkbox">
      </div>

      <div class="flex items-center justify-between mb-3">
        <span class="text-sm text-gray-600">Notificaciones</span>
        <input type="checkbox">
      </div>
    </div>

    <!-- Seguridad -->
    <div class="mb-6">
      <h2 class="text-lg font-semibold text-text mb-4">Seguridad</h2>

      <div class="mb-4">
        <label class="block text-sm text-gray-600 mb-1">Nueva contraseña</label>
        <input type="password" class="w-full border rounded px-3 py-2">
      </div>

      <div>
        <label class="block text-sm text-gray-600 mb-1">Confirmar contraseña</label>
        <input type="password" class="w-full border rounded px-3 py-2">
      </div>
    </div>

    <div>
      <button class="bg-primary hover:bg-primary-hover text-white px-4 py-2 rounded">
        Guardar Configuración
      </button>
    </div>

  </div>

</div>
{% endblock %}
