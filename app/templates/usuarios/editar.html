{% extends "base.html" %}

{% block titulo %}
Editar Usuario
{% endblock %}

{% block page_title %}
Usuarios
{% endblock %}

{% block page_sub %}
Modificar información del usuario
{% endblock %}

{% block content %}

<div class="content">

    <div class="card form-card">

        <div class="card-header">
            <div class="card-title">
                Editar Usuario
            </div>
        </div>

        <form method="POST" class="form-grid">

            <div class="form-group">

                <label>Nombre de usuario</label>

                <input
                    type="text"
                    name="nombre_usuario"
                    value="{{ usuario.nombre_usuario }}"
                    required
                >

            </div>

            <div class="form-group">

                <label>Rol</label>

                <select name="rol">

                    <option
                        value="ADMIN"
                        {% if usuario.rol == 'ADMIN' %}
                            selected
                        {% endif %}
                    >
                        Administrador
                    </option>

                    <option
                        value="VENDEDOR"
                        {% if usuario.rol == 'VENDEDOR' %}
                            selected
                        {% endif %}
                    >
                        Vendedor
                    </option>

                </select>

            </div>

            <div class="form-group">

                <label class="checkbox">

                    <input
                        type="checkbox"
                        name="activo"
                        {% if usuario.activo %}
                            checked
                        {% endif %}
                    >

                    Usuario activo

                </label>

            </div>

            <div class="form-actions">

                <a
                    href="{{ url_for('usuario.index') }}"
                    class="btn btn-secondary"
                >
                    Cancelar
                </a>

                <button
                    type="submit"
                    class="btn btn-primary"
                >
                    Actualizar
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
