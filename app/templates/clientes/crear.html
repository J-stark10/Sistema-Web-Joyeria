{% extends "base.html" %}

{% block titulo %}Nuevo Cliente{% endblock %}

{% block page_title %}Nuevo Cliente{% endblock %}

{% block page_sub %}
Registrar cliente en el sistema
{% endblock %}

{% block content %}

<div class="card">

    <form method="POST">

        <div class="form-group">
            <label>Nombre</label>
            <input type="text" name="nombre" required>
        </div>

        <div class="form-group">
            <label>CI / NIT</label>
            <input type="text" name="ci_nit" required>
        </div>

        <div class="form-group">
            <label>Teléfono</label>
            <input type="text" name="telefono">
        </div>

        <div class="form-group">
            <label>Dirección</label>
            <input type="text" name="direccion">
        </div>

        <button type="submit">
            Guardar
        </button>

        <a href="{{ url_for('cliente.index') }}">
            Cancelar
        </a>

    </form>

</div>

{% endblock %}
