{% extends "base.html" %}

{% block titulo %}
Nueva Compra
{% endblock %}

{% block page_title %}
Nueva Compra
{% endblock %}

{% block page_sub %}
Registrar compra a proveedor
{% endblock %}

{% block content %}

<div class="card">

    <form method="POST">

        <div class="form-group">

            <label>Proveedor</label>

            <select name="id_proveedor" required>

                <option value="">
                    Seleccione un proveedor
                </option>

                {% for proveedor in proveedores %}

                <option value="{{ proveedor.id_proveedor }}">
                    {{ proveedor.nombre_razon_social }}
                </option>

                {% endfor %}

            </select>

        </div>

        <hr>

        <div class="card-header">

            <div class="card-title">
                Detalle de Compra
            </div>

            <button type="button" onclick="agregarFila()">
                Agregar Joya
            </button>

        </div>

        <table id="tabla-detalles">

            <thead>

                <tr>
                    <th>Joya</th>
                    <th>Cantidad</th>
                    <th>Precio Compra</th>
                    <th>Acción</th>
                </tr>

            </thead>

            <tbody>

                <tr>

                    <td>

                        <select name="id_joya[]" required>

                            <option value="">
                                Seleccione
                            </option>

                            {% for joya in joyas %}

                            <option value="{{ joya.id_joya }}">
                                {{ joya.codigo }} - {{ joya.nombre }}
                            </option>

                            {% endfor %}

                        </select>

                    </td>

                    <td>

                        <input type="number"
                               name="cantidad[]"
                               min="1"
                               required>

                    </td>

                    <td>

                        <input type="number"
                               name="precio[]"
                               step="0.01"
                               min="0.01"
                               required>

                    </td>

                    <td>

                        <button type="button"
                                onclick="eliminarFila(this)">
                            Eliminar
                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

        <br>

        <button type="submit">
            Registrar Compra
        </button>

        <a href="{{ url_for('compra.index') }}">
            Cancelar
        </a>

    </form>

</div>

<script>

function agregarFila() {

    let tabla = document.querySelector("#tabla-detalles tbody");

    let fila = tabla.rows[0].cloneNode(true);

    fila.querySelectorAll("input").forEach(input => {
        input.value = "";
    });

    fila.querySelector("select").selectedIndex = 0;

    tabla.appendChild(fila);
}

function eliminarFila(btn) {

    let tabla = document.querySelector("#tabla-detalles tbody");

    if (tabla.rows.length === 1) {
        alert("Debe existir al menos una joya.");
        return;
    }

    btn.closest("tr").remove();
}

</script>

{% endblock %}
